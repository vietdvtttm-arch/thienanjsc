<script type="text/babel" data-presets="react">

/* ===== tokens ===== */
const C = { navy:"#14233f", navy2:"#1F3864", teal:"#1F7A6F", ink:"#1f2937", sub:"#64748b",
  line:"#e2e8f0", page:"#eef1f6" };

  "XANH": { c:"#15803d", bg:"#dcfce7", ln:"#86efac", dot:"#22c55e" },

/* ===== logic ===== */
const statusOf=(v,g,b,d)=>!isFinite(v)?"ĐỎ":d==="high"?(v>=g?"XANH":v<=b?"ĐỎ":"VÀNG"):(v<=g?"XANH":v>=b?"ĐỎ":"VÀNG");
const scoreOf=(v,g,b,d)=>{ if(!isFinite(v))return 0; let s=d==="high"?(v-b)/(g-b)*100:(b-v)/(b-g)*100; return Math.max(0,Math.min(100,s)); };
const fmtVal=(v,f)=>{ if(!isFinite(v))return"—"; if(f==="pct")return v.toFixed(1)+"%"; if(f==="x")return v.toFixed(2)+"×"; if(f==="int")return Math.round(v).toLocaleString("vi-VN"); return v.toFixed(1); };
const fmtN=(v)=>isFinite(v)?Math.round(v).toLocaleString("vi-VN"):"—";
const rollup=(arr)=>arr.includes("ĐỎ")?"ĐỎ":arr.includes("VÀNG")?"VÀNG":"XANH";
function computeKpis(node, vals){ const ext={...vals}; if(node.derive)Object.assign(ext,node.derive(ext));
  return node.kpis.map(k=>{ let v=k.calc(ext); if(!isFinite(v))v=0;
    return {...k, val:v, status:statusOf(v,k.good,k.bad,k.dir), score:scoreOf(v,k.good,k.bad,k.dir)}; }); }

function Donut({g,y,r}){
 const tot=g+y+r||1; const segs=[["XANH",g],["VÀNG",y],["ĐỎ",r]];
 const R=70, CX=90, CY=90; let off=0;
 return(<svg viewBox="0 0 180 180" className="w-full" style={{maxHeight:230}}>
  <g transform="rotate(-90 90 90)">
   {segs.map(([k,val],i)=>{const pct=val/tot*100; const el=(
     <circle key={i} cx={CX} cy={CY} r={R} fill="none" stroke={STA[k].dot} strokeWidth="22"
       pathLength="100" strokeDasharray={pct+" "+(100-pct)} strokeDashoffset={-off}/>);
     off+=pct; return el;})}
  </g>
  <text x="90" y="84" textAnchor="middle" className="mono" style={{fontSize:30,fontWeight:800,fill:C.navy}}>{tot}</text>
  <text x="90" y="104" textAnchor="middle" style={{fontSize:11,fill:C.sub}}>KPI giám sát</text>
 </svg>);}

function EvmChart({pv,ev,ac,eac,bac}){
 const W=360,H=190,pad=30,base=H-24,top=12;
 const max=Math.max(pv,ev,ac,eac,bac,1)*1.12;
 const bars=[["PV",pv,"#94a3b8"],["EV",ev,C.teal],["AC",ac,C.navy2],["EAC",eac,STA["VÀNG"].dot]];
 const bw=46, gap=(W-pad*2-bw*bars.length)/(bars.length-1);
 const yOf=v=>top+(1-v/max)*(base-top);
 const bacY=yOf(bac);
 return(<svg viewBox={"0 0 "+W+" "+H} className="w-full" style={{maxHeight:230}}>
  {[0,0.25,0.5,0.75,1].map((f,i)=>{const yy=top+(1-f)*(base-top);return(
    <g key={i}><line x1={pad} y1={yy} x2={W-pad} y2={yy} stroke="#eef2f7"/>
    <text x={pad-4} y={yy+3} textAnchor="end" style={{fontSize:8,fill:C.sub}}>{Math.round(max*f)}</text></g>);})}
  {bars.map(([name,val,col],i)=>{const x=pad+i*(bw+gap);const yy=yOf(val);return(
    <g key={i}>
     <rect x={x} y={yy} width={bw} height={base-yy} rx="3" fill={col}/>
     <text x={x+bw/2} y={yy-4} textAnchor="middle" className="mono" style={{fontSize:10,fontWeight:700,fill:C.ink}}>{fmtN(val)}</text>
     <text x={x+bw/2} y={base+13} textAnchor="middle" style={{fontSize:11,fontWeight:600,fill:C.ink}}>{name}</text>
    </g>);})}
  <line x1={pad} y1={bacY} x2={W-pad} y2={bacY} stroke={STA["ĐỎ"].c} strokeWidth="1.5" strokeDasharray="5 4"/>
  <text x={W-pad} y={bacY-4} textAnchor="end" style={{fontSize:9,fontWeight:700,fill:STA["ĐỎ"].c}}>BAC {fmtN(bac)}</text>
 </svg>);}

 const initPrj=useMemo(()=>{const o={};PROJECTS.forEach(p=>{o[p.code]={...p.vals};});return o;},[]);
 const [deptVals,setDeptVals]=useState(initDept);
 const [prjVals,setPrjVals]=useState(initPrj);
 const setD=(c,id,v)=>setDeptVals(s=>({...s,[c]:{...s[c],[id]:v}}));
 const setP=(c,id,v)=>setPrjVals(s=>({...s,[c]:{...s[c],[id]:v}}));
 const resetAll=()=>{setDeptVals(initDept);setPrjVals(initPrj);toast("Đã đặt lại về số liệu mẫu");};
 const jsonRef=useRef(null), xlsxRef=useRef(null);
 const [toastMsg,setToastMsg]=useState(null), [toastErr,setToastErr]=useState(false);
 const toast=(m,err)=>{setToastErr(!!err);setToastMsg(m);clearTimeout(window.__tt);window.__tt=setTimeout(()=>setToastMsg(null),3600);};

 const sanitizeDept=o=>{const out=clone(initDept);DEPTS.forEach(d=>{if(o&&o[d.code])d.inputs.forEach(([id])=>{const v=parseFloat(o[d.code][id]);if(isFinite(v))out[d.code][id]=v;});});return out;};
 const sanitizePrj=o=>{const out=clone(initPrj);PROJECTS.forEach(p=>{if(o&&o[p.code])Object.keys(out[p.code]).forEach(id=>{const v=parseFloat(o[p.code][id]);if(isFinite(v))out[p.code][id]=v;});});return out;};

 const saveJSON=()=>{const data=JSON.stringify({app:"QTDN-Dashboard",version:1,savedAt:new Date().toISOString(),deptVals,prjVals},null,2);
   downloadBlob(data,"du-lieu-quan-tri.json","application/json");toast("Đã lưu dữ liệu ra file .json");};
 const loadJSON=file=>{const rd=new FileReader();rd.onload=ev=>{try{const o=JSON.parse(ev.target.result);
   setDeptVals(sanitizeDept(o.deptVals));setPrjVals(sanitizePrj(o.prjVals));toast("Đã đọc dữ liệu từ file .json");}
   catch(e){toast("Lỗi đọc file JSON: "+e.message,true);}};rd.readAsText(file);};

 const exportExcel=()=>{try{
   const wb=XLSX.utils.book_new();
   const pb=[["Mã PB","Phòng ban","Mã chỉ tiêu","Chỉ tiêu","ĐVT","Giá trị"]];
   DEPTS.forEach(d=>d.inputs.forEach(([id,label,unit])=>pb.push([d.code,d.name,id,label,unit,deptVals[d.code][id]])));
   const wsPb=XLSX.utils.aoa_to_sheet(pb); wsPb["!cols"]=[{wch:10},{wch:26},{wch:14},{wch:30},{wch:8},{wch:12}];
   XLSX.utils.book_append_sheet(wb,wsPb,"NhapLieu_PhongBan");
   const da=[["Mã DA","Dự án","Nhóm","Mã chỉ tiêu","Chỉ tiêu","ĐVT","Giá trị"]];
   PROJECTS.forEach(p=>PRJ_INPUTS.forEach(([gid,gname,fs])=>fs.forEach(([id,label,unit])=>da.push([p.code,p.name,gname,id,label,unit,prjVals[p.code][id]]))));
   const wsDa=XLSX.utils.aoa_to_sheet(da); wsDa["!cols"]=[{wch:8},{wch:22},{wch:16},{wch:12},{wch:24},{wch:8},{wch:12}];
   XLSX.utils.book_append_sheet(wb,wsDa,"NhapLieu_DuAn");
   const kp=[["Phòng ban","KPI","ĐVT","Giá trị","Ngưỡng tốt","Ngưỡng xấu","Trạng thái"]];
   DEPTS.forEach(d=>computeKpis(d,deptVals[d.code]).forEach(k=>kp.push([d.name,k.label,k.unit,Math.round(k.val*100)/100,k.good,k.bad,k.status])));
   const wsKp=XLSX.utils.aoa_to_sheet(kp); wsKp["!cols"]=[{wch:24},{wch:30},{wch:8},{wch:12},{wch:11},{wch:11},{wch:10}];
   XLSX.utils.book_append_sheet(wb,wsKp,"KPI_PhongBan");
   const dm=[["Dự án","Vai trò","SPI","CPI","VAC %","Trạng thái"]];
   PROJECTS.forEach(p=>{const e={...prjVals[p.code],...PRJ_DERIVE(prjVals[p.code])};const ks=PRJ_KPIS.map(k=>statusOf(k.calc(e),k.good,k.bad,k.dir));
     dm.push([p.name,p.role,Math.round(e.ev/e.pv*100)/100,Math.round(e.ev/e.ac*100)/100,Math.round((e.bac-e.eac)/e.bac*1000)/10,rollup(ks)]);});
   const wsDm=XLSX.utils.aoa_to_sheet(dm); wsDm["!cols"]=[{wch:24},{wch:20},{wch:8},{wch:8},{wch:9},{wch:10}];
   XLSX.utils.book_append_sheet(wb,wsDm,"DanhMuc_DuAn");
   XLSX.writeFile(wb,"du-lieu-quan-tri.xlsx");
   toast("Đã xuất Excel: 2 sheet nhập liệu + 2 sheet báo cáo KPI");
 }catch(e){toast("Lỗi xuất Excel: "+e.message,true);}};

 const importExcel=file=>{const rd=new FileReader();rd.onload=ev=>{try{
   const wb=XLSX.read(new Uint8Array(ev.target.result),{type:"array"});
   let nPB=0,nDA=0; const nd=clone(deptVals), np=clone(prjVals);
   const sPb=wb.Sheets["NhapLieu_PhongBan"];
   if(sPb)XLSX.utils.sheet_to_json(sPb).forEach(r=>{const c=r["Mã PB"],id=r["Mã chỉ tiêu"],v=parseFloat(r["Giá trị"]);if(nd[c]&&id in nd[c]&&isFinite(v)){nd[c][id]=v;nPB++;}});
   const sDa=wb.Sheets["NhapLieu_DuAn"];
   if(sDa)XLSX.utils.sheet_to_json(sDa).forEach(r=>{const c=r["Mã DA"],id=r["Mã chỉ tiêu"],v=parseFloat(r["Giá trị"]);if(np[c]&&id in np[c]&&isFinite(v)){np[c][id]=v;nDA++;}});
   if(!sPb&&!sDa){toast("Không thấy sheet 'NhapLieu_PhongBan'/'NhapLieu_DuAn'. Hãy bấm 'Xuất Excel' để lấy file mẫu rồi sửa số.",true);return;}
   setDeptVals(nd);setPrjVals(np);
   toast("Đã nhập từ Excel: "+nPB+" trường phòng ban, "+nDA+" trường dự án");
 }catch(e){toast("Lỗi đọc Excel: "+e.message,true);}};rd.readAsArrayBuffer(file);};

 const agg=useMemo(()=>{let g=0,y=0,r=0;const perDept=DEPTS.map(d=>{const ks=computeKpis(d,deptVals[d.code]);
   const cD=ks.filter(k=>k.status==="ĐỎ").length,cY=ks.filter(k=>k.status==="VÀNG").length,cG=ks.filter(k=>k.status==="XANH").length;
   g+=cG;y+=cY;r+=cD;return{code:d.code,name:d.name,short:d.short,cD,cY,cG,total:ks.length,overall:rollup(ks.map(k=>k.status)),score:ks.reduce((a,k)=>a+k.score,0)/ks.length};});
   return{g,y,r,total:g+y+r,perDept};},[deptVals]);
 return(<div style={{background:C.page,color:C.ink,minHeight:"100%"}}>
  <header style={{background:C.navy}} className="text-white no-print">
   <div className="max-w-6xl mx-auto px-4 sm:px-6 py-4">
    <div className="flex items-start sm:items-center justify-between gap-4 flex-wrap">
     <div><div className="text-[11px] tracking-[0.2em] uppercase" style={{color:"#9fb3d1"}}>CÔNG TY CỔ PHẦN ĐẦU TƯ THIÊN ÂN</div>
      <h1 className="text-lg sm:text-xl font-bold mt-0.5">Bảng điều khiển Quản trị Doanh nghiệp</h1></div>
     <div className="flex items-center gap-2">
      <HealthChip label="Đỏ" n={agg.r} kind="ĐỎ"/><HealthChip label="Vàng" n={agg.y} kind="VÀNG"/><HealthChip label="Xanh" n={agg.g} kind="XANH"/></div>
    </div>
    <nav className="flex gap-1 mt-4">
     <Tab id="overview" tab={tab} setTab={setTab} icon={IcGrid}>Tổng quan</Tab>
     <Tab id="dept" tab={tab} setTab={setTab} icon={IcBuild}>Phòng ban</Tab>
     <Tab id="project" tab={tab} setTab={setTab} icon={IcFolder}>Dự án (EVM)</Tab></nav>
   </div></header>
  <div className="no-print border-b bg-white" style={{borderColor:C.line}}>
   <div className="max-w-6xl mx-auto px-4 sm:px-6 py-2 flex flex-wrap items-center gap-2">
    <span className="text-[11px] font-bold uppercase tracking-wide mr-1" style={{color:C.sub}}>Dữ liệu</span>
    <TBtn onClick={saveJSON} icon={IcSave}>Lưu (.json)</TBtn>
    <TBtn onClick={()=>jsonRef.current.click()} icon={IcOpen}>Mở (.json)</TBtn>
    <span className="w-px h-5" style={{background:C.line}}></span>
    <TBtn onClick={()=>xlsxRef.current.click()} icon={IcXlsx}>Nhập Excel</TBtn>
    <TBtn onClick={exportExcel} icon={IcXlsx}>Xuất Excel</TBtn>
    <span className="w-px h-5" style={{background:C.line}}></span>
    <TBtn onClick={()=>window.print()} icon={IcPdf}>Xuất PDF</TBtn>
    <div className="flex-1"></div>
    <TBtn onClick={resetAll} icon={IcReset} danger>Đặt lại</TBtn>
    <input ref={jsonRef} type="file" accept=".json" className="hidden" onChange={e=>{if(e.target.files[0])loadJSON(e.target.files[0]);e.target.value="";}}/>
    <input ref={xlsxRef} type="file" accept=".xlsx,.xls" className="hidden" onChange={e=>{if(e.target.files[0])importExcel(e.target.files[0]);e.target.value="";}}/>
   </div></div>
  <main className="max-w-6xl mx-auto px-4 sm:px-6 py-6">
   <div className="print-title avoid-break" style={{marginBottom:16,borderBottom:"2px solid "+C.navy,paddingBottom:8}}>
    <div style={{fontSize:20,fontWeight:800,color:C.navy}}>Báo cáo Quản trị Điều hành</div>
    <div style={{fontSize:12,color:C.sub}}>CÔNG TY CỔ PHẦN ĐẦU TƯ THIÊN ÂN · Ngày in: {new Date().toLocaleDateString("vi-VN")} · Sức khỏe: {agg.r} Đỏ / {agg.y} Vàng / {agg.g} Xanh</div>
   </div>
   {tab==="overview"&&<Overview agg={agg} go={c=>{setSelDept(c);setTab("dept");}}/>}
   {tab==="dept"&&<DeptView dept={DEPTS.find(d=>d.code===selDept)} sel={selDept} setSel={setSelDept} vals={deptVals[selDept]} setD={setD}/>}
   {tab==="project"&&<ProjectView sel={selPrj} setSel={setSelPrj} prjVals={prjVals} setP={setP}/>}
   <footer className="mt-8 text-[11px]" style={{color:C.sub}}>
    Số liệu khởi tạo là dữ liệu mẫu minh họa. Chỉnh số ở ô nhập → mọi chỉ số, biểu đồ và cảnh báo tự cập nhật.
    Ngưỡng đánh giá tham chiếu chuẩn ngành — hiệu chỉnh theo kế hoạch của Công ty.</footer>
  </main>
  {toastMsg&&<div className="no-print fixed left-1/2 bottom-5 -translate-x-1/2 z-50 text-sm font-semibold rounded-lg px-4 py-2.5 shadow-lg"
    style={{background:toastErr?"#7f1d1d":C.navy,color:"#fff",maxWidth:"90vw"}}>{toastMsg}</div>}
 </div>);}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
